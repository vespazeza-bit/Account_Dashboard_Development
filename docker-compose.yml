version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: accounting_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: accounting_db
      MYSQL_USER: vespazeza
      MYSQL_PASSWORD: 64120482
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/features.sql:/docker-entrypoint-initdb.d/02_features.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: accounting_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: vespazeza
      DB_PASSWORD: 64120482
      DB_NAME: accounting_db
    ports:
      - "6001:6001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    container_name: accounting_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
